server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true


spring:
  application:
    name: sird-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/sird_db
    username: sird_user
    password: sird_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: sird
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    schemas: sird
    default-schema: sird
    create-schemas: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

sird:
  seguridad:
    jwt:
      issuer: SIRD-GORE-CUSCO
      access-token-minutos: 60
      refresh-token-dias: 7

  minio:
    endpoint: http://localhost:9000
    access-key: sird_minio
    secret-key: sird_minio_123456
    bucket-documentos: sird-documentos
