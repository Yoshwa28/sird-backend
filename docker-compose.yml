services:
  postgres:
    image: postgres:16
    container_name: sird-postgres
    environment:
      POSTGRES_DB: sird_db
      POSTGRES_USER: sird_user
      POSTGRES_PASSWORD: sird_password
    ports:
      - "5432:5432"
    volumes:
      - sird_postgres_data:/var/lib/postgresql/data
    networks:
      - sird-network

  minio:
    image: minio/minio:latest
    container_name: sird-minio
    environment:
      MINIO_ROOT_USER: sird_minio
      MINIO_ROOT_PASSWORD: sird_minio_123456
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sird_minio_data:/data
    networks:
      - sird-network

volumes:
  sird_postgres_data:
  sird_minio_data:

networks:
  sird-network:
    driver: bridge
